name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  conventional-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows Conventional Commits
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|perf|refactor|docs|chore|test|build|ci|revert)(\([a-z0-9._/-]+\))?(!)?: .+$'
          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            echo "Invalid PR title: $PR_TITLE"
            echo "Expected Conventional Commit style, e.g. 'feat: add provider', 'fix(cli): handle empty tags', 'feat!: drop Node 18'"
            exit 1
          fi
