name: Release

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    if: |
      (github.ref_name == 'main' && needs.release-please.outputs.release_created == 'true') ||
      github.ref_name == 'develop' ||
      github.event_name == 'workflow_dispatch'
    needs: [release-please]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Resolve package metadata
        id: pkg
        shell: bash
        run: |
          echo "name=$(node -p 'require("./package.json").name')" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Resolve publish mode
        id: mode
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Release created on main by release-please — stable publish
          if [ "$REF_NAME" = "main" ]; then
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "publish_version=${{ steps.pkg.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "publish_channel=stable" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # develop push or manual dispatch on develop — prerelease publish
          if [ "$REF_NAME" = "develop" ]; then
            BASE_VERSION="${{ steps.pkg.outputs.version }}"
            BASE_NUMERIC="${BASE_VERSION%%-*}"
            SHORT_SHA="${GITHUB_SHA::7}"
            PRE_VERSION="${BASE_NUMERIC}-dev.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"

            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
            echo "publish_version=${PRE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "publish_channel=prerelease" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unsupported ref for publishing: ${GITHUB_REF}"
          exit 1

      - name: Set prerelease package version
        if: steps.mode.outputs.publish_channel == 'prerelease'
        shell: bash
        run: npm version "${{ steps.mode.outputs.publish_version }}" --no-git-tag-version --allow-same-version

      - name: Check if version already exists on npm
        id: check
        shell: bash
        run: |
          set +e
          npm view "${{ steps.pkg.outputs.name }}@${{ steps.mode.outputs.publish_version }}" version >/dev/null 2>&1
          EXISTS=$?
          set -e

          if [ "$EXISTS" -eq 0 ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version already published, skipping."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version not found on npm, publishing."
          fi

      - name: Publish package
        if: steps.check.outputs.should_publish == 'true'
        shell: bash
        run: npm publish --access public --provenance --tag "${{ steps.mode.outputs.dist_tag }}"
